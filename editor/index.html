<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Editor for MILC survey nodes" />
    <meta name="author" content="Sendevo Software" />
    <title>MILC Survey Editor</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Auth banner (shown when Firebase is connected but user is not signed in) -->
<div id="auth-banner" style="display:none">
    <span>Sign in to edit</span>
    <input type="email" id="auth-email" placeholder="email" />
    <input type="password" id="auth-password" placeholder="password" />
    <button id="btn-auth-signin" class="btn-primary">Sign in</button>
    <span id="auth-banner-error" class="auth-error"></span>
</div>

<div id="app">
    <header>
        <h1>MILC Survey Editor</h1>
        <div class="header-actions">
            <button id="btn-theme" title="Toggle theme">🌙</button>
            <button id="btn-firebase-status" class="btn-firebase" title="Configure Firebase sync">🔥 Not connected</button>
            <button id="btn-push-firebase" style="display:none" title="Push all local nodes to Firebase">⬆ Push all to Firebase</button>
            <button id="btn-import">⬆ Import JSON</button>
            <button id="btn-export-nodes" class="btn-primary">⬇ Export nodes.json</button>
        </div>
        <input type="file" id="file-import" accept=".json" style="display:none" multiple />
    </header>

    <div id="main">
        <!-- Left panel: node list -->
        <aside id="node-list-panel">
            <div class="panel-header">
                <span>Nodes</span>
                <button id="btn-add-node" title="Add node">＋</button>
            </div>
            <ul id="node-list"></ul>
        </aside>

        <!-- Center panel: node editor -->
        <section id="editor-panel">
            <div id="editor-placeholder">← Select or create a node</div>
            <div id="editor-form" style="display:none">

                <div class="form-group">
                    <label>Node ID</label>
                    <input type="text" id="field-id" placeholder="e.g. before-milking-start" />
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="field-title-en" placeholder="English" />
                    <input type="text" id="field-title-es" placeholder="Español" />
                </div>

                <div class="form-group">
                    <label>Subtitle <small>(optional)</small></label>
                    <input type="text" id="field-subtitle-en" placeholder="English" />
                    <input type="text" id="field-subtitle-es" placeholder="Español" />
                </div>

                <div class="form-group checkbox-group">
                    <label><input type="checkbox" id="field-showDate" /> Show date</label>
                </div>

                <div class="form-group">
                    <label>Icon filename <small>(optional)</small></label>
                    <input type="text" id="field-icon" placeholder="e.g. shroom.png" />
                </div>

                <!-- Fields -->
                <div class="section-header">
                    <span>Fields</span>
                    <div class="field-type-btns">
                        <button class="btn-add-field" data-type="select">＋ Select</button>
                        <button class="btn-add-field" data-type="number_input">＋ Number</button>
                        <button class="btn-add-field" data-type="image_list">＋ Images</button>
                        <button class="btn-add-field" data-type="alert">＋ Alert</button>
                        <button class="btn-add-field" data-type="month_picker">＋ Month picker</button>
                    </div>
                </div>
                <div id="fields-container"></div>

                <!-- Next navigation -->
                <div class="section-header">
                    <span>Next</span>
                </div>
                <div id="next-container">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="next-type">
                            <option value="null">None (terminal)</option>
                            <option value="direct">Direct → node</option>
                            <option value="field">Field map</option>
                        </select>
                    </div>
                    <div id="next-direct" style="display:none" class="form-group">
                        <label>Target node ID</label>
                        <input type="text" id="next-direct-target" />
                    </div>
                    <div id="next-field-map" style="display:none">
                        <div class="form-group">
                            <label>Field ID</label>
                            <input type="text" id="next-field-id" />
                        </div>
                        <div id="next-map-rows"></div>
                        <button id="btn-add-map-row" class="btn-sm">＋ Add mapping</button>
                    </div>
                </div>

                <div class="editor-actions">
                    <button id="btn-save-node" class="btn-primary">Save node</button>
                    <button id="btn-delete-node" class="btn-danger">Delete node</button>
                </div>
            </div>
        </section>

    </div>
</div>

<!-- Firebase config modal -->
<div id="modal-firebase" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <h2>Firebase Configuration</h2>
        <p class="modal-hint">Credentials are saved only in this browser's localStorage and never leave your machine.</p>
        <div class="form-group">
            <label>API Key</label>
            <input type="text" id="fb-api-key" placeholder="AIza..." />
        </div>
        <div class="form-group">
            <label>Auth Domain</label>
            <input type="text" id="fb-auth-domain" placeholder="your-project.firebaseapp.com" />
        </div>
        <div class="form-group">
            <label>Project ID</label>
            <input type="text" id="fb-project-id" placeholder="your-project" />
        </div>
        <div class="form-group">
            <label>Database URL</label>
            <input type="text" id="fb-database-url" placeholder="https://your-project-default-rtdb.firebaseio.com" />
        </div>
        <div class="modal-actions">
            <button id="fb-modal-connect" class="btn-primary">Connect</button>
            <button id="fb-modal-disconnect" class="btn-danger">Disconnect</button>
            <button id="fb-modal-cancel">Cancel</button>
        </div>
        <p id="fb-modal-error" class="modal-error" style="display:none"></p>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
